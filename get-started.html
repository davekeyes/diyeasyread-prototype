<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Try it now — DIY Easy Read</title>
<link rel="stylesheet" href="assets/colors_and_type.css">
<link rel="stylesheet" href="assets/site.css">
</head>
<body>

<header class="wrap site-header">
  <a class="logo" href="index.html">
    <img src="assets/img/logo-diyer.svg" alt="DIY Easy Read logo: an open book outline with a tick inside, and a star in the top right corner">
  </a>
  <nav class="main-nav" aria-label="Main">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="pricing.html">Pricing</a>
  </nav>
  <div class="nav-actions">
    <span class="btn btn-step">Trying it out</span>
    <a class="link" href="#sign-in">Sign up or sign in</a>
  </div>
</header>

<main class="wrap">
  <div class="hero-drop" id="dropzone">
    <div class="hero-drop-illustration">
      <img src="assets/img/diyer-addfile-illustration.svg" alt="An illustration of a person adding a file to translate">
    </div>
    <div class="hero-drop-content">
      <img src="assets/icons/arrow-down.svg" alt="" class="arrow" width="64" height="64">
      <p class="lead-in">Tap to select a file, or</p>
      <p class="heading">
        <span class="heading-main">drop a file here</span><br>
        <span class="heading-sub">to translate to </span><span class="heading-accent">Easy Read</span>
      </p>
      <span class="caption">.docx or .pdf, up to 20pg or 50mb</span>
    </div>
    <input type="file" id="file-input" accept=".doc,.docx,.pdf" style="display:none;">
  </div>
</main>

<footer class="site-footer wrap">
  <span>&copy; DIY Easy Read, from Volition</span>
  <nav aria-label="Footer">
    <a href="about.html">About</a>
    <a href="pricing.html">Pricing</a>
    <a href="#terms">Terms of Service</a>
    <a href="#contact">Contact us</a>
  </nav>
</footer>

<script>
  const dz = document.getElementById('dropzone');
  const fileInput = document.getElementById('file-input');
  function goToTranslating() { window.location.href = 'translating.html'; }
  dz.addEventListener('click', () => fileInput.click());
  dz.addEventListener('dragover', e => e.preventDefault());
  dz.addEventListener('drop', e => { e.preventDefault(); goToTranslating(); });
  fileInput.addEventListener('change', () => { if (fileInput.files.length) goToTranslating(); });
</script>

</body>
</html>
