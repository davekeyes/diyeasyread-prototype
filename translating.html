<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Translating to Easy Read — DIY Easy Read</title>
<link rel="stylesheet" href="assets/colors_and_type.css">
<link rel="stylesheet" href="assets/site.css">
</head>
<body>

<div class="translating-page">
  <button class="icon-fab close" aria-label="Close" onclick="window.location.href='get-started.html'">
    <img src="assets/icons/close.svg" alt="" width="20" height="20">
  </button>
  <button class="icon-fab" aria-label="More options" style="position:absolute; top:var(--space-4); right:88px;">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="2" cy="8" r="1.5" fill="#003B49"/><circle cx="8" cy="8" r="1.5" fill="#003B49"/><circle cx="14" cy="8" r="1.5" fill="#003B49"/></svg>
  </button>

  <div class="translating-card">
    <div class="translating-content">
      <h1 class="translating-heading">Translating to Easy Read&hellip;</h1>
      <p class="translating-filename">story_of_dorothy2026.pdf</p>
      <div class="translating-loader"><div class="translating-spinner"></div></div>
      <button class="translating-cancel" onclick="window.location.href='get-started.html'">Cancel</button>
    </div>
  </div>
</div>

<script>
  setTimeout(() => { window.location.href = 'ready.html'; }, 2200);
</script>

</body>
</html>
