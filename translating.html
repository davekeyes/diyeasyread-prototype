<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Translating to Easy Read — DIY Easy Read</title>
<link rel="stylesheet" href="assets/colors_and_type.css">
<link rel="stylesheet" href="assets/site.css">
</head>
<body>

<div class="translate-backdrop">
  <div class="translate-card">
    <div>
      <span class="translate-filename">story_of_dorothy2026.pdf</span>
      <h2>Translating to Easy Read</h2>
    </div>
    <div class="translate-stages" id="stages">
      <div class="translate-stage" data-stage="0">
        <div class="stage-dot stage-dot--active"></div>
        <span>Uploading your file</span>
      </div>
      <div class="translate-stage" data-stage="1">
        <div class="stage-dot stage-dot--pending"></div>
        <span>Getting things ready</span>
      </div>
      <div class="translate-stage" data-stage="2">
        <div class="stage-dot stage-dot--pending"></div>
        <span>Translating your content into Easy Read</span>
      </div>
    </div>
    <div class="translate-note">
      <span>While you wait&hellip;</span>
      <span>You can scroll through pages below.</span>
    </div>
  </div>
</div>

<script>
  const rows = document.querySelectorAll('#stages .translate-stage');

  function setStage(n) {
    rows.forEach((row, i) => {
      const dot = row.querySelector('.stage-dot');
      dot.className = 'stage-dot';
      if (i < n) {
        dot.classList.add('stage-dot--done');
        dot.innerHTML = '<img src="assets/icons/check.svg" alt="">';
      } else if (i === n) {
        dot.classList.add('stage-dot--active');
      } else {
        dot.classList.add('stage-dot--pending');
      }
    });
  }

  function tick(n) {
    setTimeout(() => {
      if (n < rows.length) {
        setStage(n);
        tick(n + 1);
      } else {
        window.location.href = 'ready.html';
      }
    }, 850);
  }

  tick(1);
</script>

</body>
</html>
